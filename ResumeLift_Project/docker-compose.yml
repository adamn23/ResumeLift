services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resumelift
      POSTGRES_USER: resumelift
      POSTGRES_PASSWORD: resumelift
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumelift -d resumelift"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://resumelift:resumelift@postgres:5432/resumelift
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
